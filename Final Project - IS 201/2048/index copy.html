<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2048 for Fun</title>
  <style>
    :root {
      --bg: #111827;
      --panel: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --tile-2: #dbeafe;
      --tile-4: #bfdbfe;
      --tile-8: #c7d2fe;
      --tile-16: #f5d0fe;
      --tile-32: #fbcfe8;
      --tile-64: #fda4af;
      --tile-128: #a5f3fc;
      --tile-256: #6ee7b7;
      --tile-512: #34d399;
      --tile-1024: #60a5fa;
      --tile-2048: #c084fc;
      --tile-dark: rgba(15, 23, 42, 0.8);
      --shadow: 0 18px 50px rgba(7, 12, 34, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top left, #1e3a8a 0%, #111827 45%, #0f172a 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .app {
      width: min(480px, 100%);
      display: grid;
      gap: 22px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .title {
      font-size: 1.75rem;
      letter-spacing: 0.03em;
      line-height: 1.1;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 6px 0 0;
      font-size: 0.95rem;
    }

    .score-panel {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .score-box {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 18px;
      min-width: 104px;
      text-align: center;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.05);
    }

    .score-box strong {
      display: block;
      font-size: 1.3rem;
      letter-spacing: 0.02em;
    }

    .score-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-top: 4px;
    }

    .board-wrapper {
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .board {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      position: relative;
    }

    .cell,
    .tile {
      border-radius: 16px;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .cell {
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .tile {
      position: absolute;
      top: 14px;
      left: 14px;
      transition: transform 150ms ease, background-color 150ms ease, color 150ms ease;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #102a43;
      text-shadow: 0 1px 2px rgba(255,255,255,0.2);
      user-select: none;
    }

    .tile span {
      font-size: clamp(1.25rem, 2vw, 2rem);
    }

    .tile[data-value="2"] { background: var(--tile-2); color: #1e293b; }
    .tile[data-value="4"] { background: var(--tile-4); color: #1e293b; }
    .tile[data-value="8"] { background: var(--tile-8); color: #0f172a; }
    .tile[data-value="16"] { background: var(--tile-16); color: #0f172a; }
    .tile[data-value="32"] { background: var(--tile-32); color: #0f172a; }
    .tile[data-value="64"] { background: var(--tile-64); color: #0f172a; }
    .tile[data-value="128"] { background: var(--tile-128); color: #0f172a; }
    .tile[data-value="256"] { background: var(--tile-256); color: #0f172a; }
    .tile[data-value="512"] { background: var(--tile-512); color: #0f172a; }
    .tile[data-value="1024"] { background: var(--tile-1024); color: #0f172a; }
    .tile[data-value="2048"] { background: var(--tile-2048); color: #0f172a; }
    .tile[data-value="4096"] { background: #f97316; color: #111827; }
    .tile[data-value="8192"] { background: #faf089; color: #111827; }

    .info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .info p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: none;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06));
      color: #f8fafc;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: transform 120ms ease, background-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.18);
    }

    button:active {
      transform: translateY(0);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.75);
      border-radius: 20px;
      color: #fff;
      text-align: center;
      padding: 24px;
      z-index: 2;
    }

    .overlay.show {
      display: grid;
    }

    .overlay h2 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }

    .overlay button {
      margin-top: 16px;
      width: fit-content;
    }

    @media (max-width: 500px) {
      .app {
        gap: 18px;
      }

      .title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <div>
        <h1 class="title">2048 for Fun</h1>
        <p class="subtitle">Use arrows or WASD to slide and merge tiles.</p>
      </div>
      <div class="score-panel">
        <div class="score-box">
          <strong id="score">0</strong>
          <span class="score-label">Score</span>
        </div>
        <div class="score-box">
          <strong id="best">0</strong>
          <span class="score-label">High Score</span>
        </div>
      </div>
    </div>

    <div class="board-wrapper">
      <div class="board" id="board">
        <div class="overlay" id="overlay">
          <h2 id="overlayTitle">Game Over</h2>
          <p id="overlayMessage">Try again to beat your high score.</p>
          <button id="restartButton">Restart</button>
        </div>
      </div>
    </div>

    <div class="info">
      <p>2048 is a sliding tile game. Match tiles of the same value to combine them and reach 2048. The game ends when no moves remain.</p>
      <div class="controls">
        <button id="newGameButton">New Game</button>
      </div>
    </div>
  </div>

  <script>
    const boardElement = document.getElementById('board');
    const scoreElement = document.getElementById('score');
    const bestElement = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayMessage = document.getElementById('overlayMessage');
    const restartButton = document.getElementById('restartButton');
    const newGameButton = document.getElementById('newGameButton');

    const size = 4;
    let grid = [];
    let score = 0;
    let bestScore = Number(localStorage.getItem('bestScore')) || 0;
    let won = false;
    let gameOver = false;

    bestElement.textContent = bestScore;

    function createGrid() {
      boardElement.innerHTML = '';
      const cells = [];

      for (let i = 0; i < size * size; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        boardElement.appendChild(cell);
        cells.push(cell);
      }

      for (let row = 0; row < size; row++) {
        grid[row] = [];
        for (let col = 0; col < size; col++) {
          grid[row][col] = 0;
        }
      }
    }

    function randomEmptyTile() {
      const empties = [];
      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          if (grid[row][col] === 0) empties.push({ row, col });
        }
      }
      return empties[Math.floor(Math.random() * empties.length)];
    }

    function addRandomTile() {
      const empty = randomEmptyTile();
      if (!empty) return;
      grid[empty.row][empty.col] = Math.random() < 0.9 ? 2 : 4;
    }

    function updateScore(value) {
      score += value;
      scoreElement.textContent = score;
      if (score > bestScore) {
        bestScore = score;
        bestElement.textContent = bestScore;
        localStorage.setItem('bestScore', bestScore);
      }
    }

    function positionStyle(row, col) {
      const gap = 12;
      const tileSize = (boardElement.clientWidth - gap * 3) / 4;
      return {
        transform: `translate(${col * (tileSize + gap)}px, ${row * (tileSize + gap)}px)`,
        width: `${tileSize}px`,
        height: `${tileSize}px`
      };
    }

    function render() {
      const gap = 12;
      const boardPadding = 14;
      const boardContent = boardElement.clientWidth - boardPadding * 2;
      const tileSize = (boardContent - gap * 3) / 4;

      boardElement.querySelectorAll('.cell').forEach((cell) => {
        cell.style.width = `${tileSize}px`;
        cell.style.height = `${tileSize}px`;
      });

      const tileMap = new Map();
      boardElement.querySelectorAll('.tile').forEach(tile => {
        const pos = `${tile.dataset.row},${tile.dataset.col}`;
        tileMap.set(pos, tile);
      });

      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          const value = grid[row][col];
          const pos = `${row},${col}`;

          if (value === 0) {
            const tile = tileMap.get(pos);
            if (tile) tile.remove();
            tileMap.delete(pos);
            continue;
          }

          let tile = tileMap.get(pos);
          if (!tile) {
            tile = document.createElement('div');
            tile.className = 'tile';
            boardElement.appendChild(tile);
          }

          tile.dataset.row = row;
          tile.dataset.col = col;
          tile.dataset.value = value;
          tile.style.width = `${tileSize}px`;
          tile.style.height = `${tileSize}px`;
          tile.innerHTML = `<span>${value}</span>`;
          
          const x = col * (tileSize + gap);
          const y = row * (tileSize + gap);
          tile.style.transform = `translate(${x}px, ${y}px)`;

          if (tile.dataset.prevValue && tile.dataset.prevValue !== value) {
            tile.classList.add('merged');
            setTimeout(() => tile.classList.remove('merged'), 150);
          }
          tile.dataset.prevValue = value;
        }
      }
    }

    function mergeRow(row) {
      const filtered = row.filter(value => value !== 0);
      const merged = [];
      let gained = 0;

      for (let i = 0; i < filtered.length; i++) {
        if (filtered[i] === filtered[i + 1]) {
          const sum = filtered[i] * 2;
          merged.push(sum);
          gained += sum;
          i++;
        } else {
          merged.push(filtered[i]);
        }
      }

      while (merged.length < size) merged.push(0);
      return { row: merged, gained };
    }

    function move(direction) {
      if (gameOver) return;

      let moved = false;
      let totalGain = 0;
      const oldGrid = JSON.stringify(grid);

      const transform = {
        ArrowLeft: () => {
          for (let row = 0; row < size; row++) {
            const { row: newRow, gained } = mergeRow(grid[row]);
            if (newRow.some((value, index) => value !== grid[row][index])) moved = true;
            totalGain += gained;
            grid[row] = newRow;
          }
        },
        ArrowRight: () => {
          for (let row = 0; row < size; row++) {
            const reversed = [...grid[row]].reverse();
            const { row: mergedRow, gained } = mergeRow(reversed);
            const newRow = mergedRow.reverse();
            if (newRow.some((value, index) => value !== grid[row][index])) moved = true;
            totalGain += gained;
            grid[row] = newRow;
          }
        },
        ArrowUp: () => {
          for (let col = 0; col < size; col++) {
            const colValues = Array.from({ length: size }, (_, row) => grid[row][col]);
            const { row: mergedCol, gained } = mergeRow(colValues);
            mergedCol.forEach((value, row) => {
              if (grid[row][col] !== value) moved = true;
              grid[row][col] = value;
            });
            totalGain += gained;
          }
        },
        ArrowDown: () => {
          for (let col = 0; col < size; col++) {
            const colValues = Array.from({ length: size }, (_, row) => grid[row][col]).reverse();
            const { row: mergedCol, gained } = mergeRow(colValues);
            mergedCol.reverse().forEach((value, row) => {
              if (grid[row][col] !== value) moved = true;
              grid[row][col] = value;
            });
            totalGain += gained;
          }
        }
      };

      if (!transform[direction]) return;
      transform[direction]();
      if (!moved) return;

      updateScore(totalGain);
      addRandomTile();
      render();
      checkGameState();

      if (JSON.stringify(grid) !== oldGrid) {
        boardElement.classList.add('moved');
        setTimeout(() => boardElement.classList.remove('moved'), 120);
      }
    }

    function canMove() {
      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          if (grid[row][col] === 0) return true;
          if (col < size - 1 && grid[row][col] === grid[row][col + 1]) return true;
          if (row < size - 1 && grid[row][col] === grid[row + 1][col]) return true;
        }
      }
      return false;
    }

    function checkGameState() {
      if (!won && grid.some(row => row.includes(2048))) {
        won = true;
        overlayTitle.textContent = 'You Win!';
        overlayMessage.textContent = 'Awesome work — you reached 2048. Keep going or restart to play again.';
        overlay.classList.add('show');
        return;
      }

      if (!canMove()) {
        gameOver = true;
        overlayTitle.textContent = 'Game Over';
        overlayMessage.textContent = 'No moves left. Restart to try again.';
        overlay.classList.add('show');
      }
    }

    function newGame() {
      score = 0;
      won = false;
      gameOver = false;
      scoreElement.textContent = score;
      overlay.classList.remove('show');
      createGrid();
      addRandomTile();
      addRandomTile();
      render();
    }

    document.addEventListener('keydown', (event) => {
      const mapping = {
        w: 'ArrowUp',
        a: 'ArrowLeft',
        s: 'ArrowDown',
        d: 'ArrowRight'
      };
      const key = event.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(key) || mapping[key]) {
        event.preventDefault();
        move(mapping[key] || key);
      }
    });

    restartButton.addEventListener('click', newGame);
    newGameButton.addEventListener('click', newGame);

    window.addEventListener('resize', render);

    newGame();
  </script>
</body>
</html>
